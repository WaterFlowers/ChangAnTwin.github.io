<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects</title>
    <style>
        /* 项目卡片网格布局 */
        .project-grid {
            display: grid !important;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
            padding: 2rem 0;
        }
        .project-card {
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            overflow: hidden;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            display: flex;
            flex-direction: column;
        }
        .project-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.12);
        }
        .project-card-cover img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
        }
        .project-card-body {
            padding: 1.2rem;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .project-card-title {
            font-size: 1.4rem;
            font-weight: 600;
            margin: 0 0 0.5rem 0;
        }
        .project-card-title a {
            color: #2c3e50;
            text-decoration: none;
        }
        .project-card-summary {
            font-size: 0.95rem;
            color: #555;
            margin: 0 0 0.8rem 0;
            flex: 1;
        }
        .project-tech-stack {
            margin: 0.5rem 0;
        }
        .tech-tag {
            display: inline-block;
            background: #ecf0f1;
            color: #2c3e50;
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-right: 0.3rem;
            margin-bottom: 0.3rem;
        }
        .project-links {
            margin-top: auto;
        }
        .project-links a {
            display: inline-block;
            margin-right: 1rem;
            font-size: 0.9rem;
            color: #3498db;
            text-decoration: none;
        }
        .project-links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <h1>Projects</h1>
    <div class="project-grid">
        {{ range .Pages }}
        <div class="project-card">
            {{ if .Params.cover }}
            <div class="project-card-cover">
                <img src="{{ .Params.cover | relURL }}" alt="{{ .Title }}">
            </div>
            {{ end }}
            <div class="project-card-body">
                <h2 class="project-card-title">
                    <a href="{{ .RelPermalink }}">{{ .Title }}</a>
                </h2>
                {{ with .Params.summary }}
                <p class="project-card-summary">{{ . }}</p>
                {{ end }}
                {{ with .Params.tech_stack }}
                <div class="project-tech-stack">
                    {{ range . }}
                    <span class="tech-tag">{{ . }}</span>
                    {{ end }}
                </div>
                {{ end }}
                <div class="project-links">
                    {{ with .Params.project_url }}
                    <a href="{{ . }}" target="_blank">🔗 项目链接</a>
                    {{ end }}
                    {{ with .Params.demo_url }}
                    <a href="{{ . }}" target="_blank">🚀 在线演示</a>
                    {{ end }}
                </div>
            </div>
        </div>
        {{ end }}
    </div>
</body>
</html>

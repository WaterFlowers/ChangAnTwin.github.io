<!DOCTYPE html>
<html lang="en">
<head><script src="/livereload.js?mindelay=10&amp;v=2&amp;port=1313&amp;path=livereload" data-no-instant defer></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects</title>
    <style>
         
        .project-grid {
            display: grid !important;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
            padding: 2rem 0;
        }
        .project-card {
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            overflow: hidden;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            display: flex;
            flex-direction: column;
        }
        .project-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.12);
        }
        .project-card-cover img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
        }
        .project-card-body {
            padding: 1.2rem;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .project-card-title {
            font-size: 1.4rem;
            font-weight: 600;
            margin: 0 0 0.5rem 0;
        }
        .project-card-title a {
            color: #2c3e50;
            text-decoration: none;
        }
        .project-card-summary {
            font-size: 0.95rem;
            color: #555;
            margin: 0 0 0.8rem 0;
            flex: 1;
        }
        .project-tech-stack {
            margin: 0.5rem 0;
        }
        .tech-tag {
            display: inline-block;
            background: #ecf0f1;
            color: #2c3e50;
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-right: 0.3rem;
            margin-bottom: 0.3rem;
        }
        .project-links {
            margin-top: auto;
        }
        .project-links a {
            display: inline-block;
            margin-right: 1rem;
            font-size: 0.9rem;
            color: #3498db;
            text-decoration: none;
        }
        .project-links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <h1>Projects</h1>
    <div class="project-grid">
        
        <div class="project-card">
            
            <div class="project-card-cover">
                <img src="/images/project1.jpg" alt="我的第一个项目">
            </div>
            
            <div class="project-card-body">
                <h2 class="project-card-title">
                    <a href="/projects/test/">我的第一个项目</a>
                </h2>
                
                <p class="project-card-summary">这是一个使用 Hugo 构建的静态网站，具有作品集展示功能。</p>
                
                
                <div class="project-tech-stack">
                    
                    <span class="tech-tag">Hugo</span>
                    
                    <span class="tech-tag">LoveIt</span>
                    
                    <span class="tech-tag">CSS</span>
                    
                </div>
                
                <div class="project-links">
                    
                    <a href="https://github.com/WaterFlowers/my-project" target="_blank">🔗 项目链接</a>
                    
                    
                    <a href="https://my-project-demo.vercel.app" target="_blank">🚀 在线演示</a>
                    
                </div>
            </div>
        </div>
        
    </div>
</body>
</html>

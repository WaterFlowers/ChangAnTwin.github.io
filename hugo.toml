baseURL = 'https://waterflowers.github.io/'
title = '我的博客'
theme = 'PaperMod'
locale = 'zh-cn'

[params]
  ShowSearch = true
  ShowCodeCopyButtons = true
  ShowReadingTime = true
  ShowBreadCrumbs = true
  defaultTheme = 'auto'

[params.label]
  text = 'WaterFlowers'
  icon = '/images/avatar.jpg'
  iconHeight = 235

[params.homeInfoParams]
  Title = '嗨，我是 WaterFlowers 👋'
  Content = """
这里记录我的技术学习、生活随想。
喜欢开源、摄影和咖啡。
[→ 查看更多文章](/posts)
"""

[[params.socialIcons]]
  name = 'github'
  url = 'https://github.com/WaterFlowers'

[[params.socialIcons]]
  name = 'email'
  url = 'mailto:your@email.com'

[[params.socialIcons]]
  name = 'rss'
  url = '/index.xml'

[[menu.main]]
  name = '文章'
  url = '/posts/'
  weight = 1

[[menu.main]]
  name = '标签'
  url = '/tags/'
  weight = 2

[[menu.main]]
  name = '关于'
  url = '/about/'
  weight = 3